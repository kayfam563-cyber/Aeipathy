<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Aeipathy</title>
  <style>
    body {
      font-family: Arial;
      background: #f5f5f5;
      text-align: center;
      padding: 20px;
    }
    h1 {
      color: #4CAF50;
    }
    .card {
      background: white;
      padding: 20px;
      margin: 15px auto;
      width: 300px;
      border-radius: 10px;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }
    button {
      padding: 10px;
      margin: 5px;
      border: none;
      background: #4CAF50;
      color: white;
      border-radius: 5px;
      cursor: pointer;
    }
  </style>
</head>
<body>

<h1>🌍 Aeipathy</h1>
<p>Learn a new language every day</p>

<!-- Daily Word -->
<div class="card">
  <h2>📅 Daily Word</h2>
  <p id="dailyWord"></p>
</div>

<!-- Flashcards -->
<div class="card">
  <h2>🧠 Flashcards</h2>
  <p id="flashcard">Click to start</p>
  <button onclick="nextFlashcard()">Next</button>
</div>

<!-- Quiz -->
<div class="card">
  <h2>❓ Quiz</h2>
  <p id="question"></p>
  <button onclick="answer('A')">A</button>
  <button onclick="answer('B')">B</button>
  <button onclick="answer('C')">C</button>
  <p id="result"></p>
</div>

<!-- Progress -->
<div class="card">
  <h2>📊 Progress</h2>
  <p id="score">Score: 0</p>
</div>

<script>
  // Vocabulary Data
  const words = [
    {word: "Hola", meaning: "Hello"},
    {word: "Gracias", meaning: "Thank you"},
    {word: "Adiós", meaning: "Goodbye"}
  ];

  // Daily Word
  const today = new Date().getDate() % words.length;
  document.getElementById("dailyWord").innerText =
    words[today].word + " = " + words[today].meaning;

  // Flashcards
  let flashIndex = 0;
  function nextFlashcard() {
    const card = words[flashIndex];
    document.getElementById("flashcard").innerText =
      card.word + " = " + card.meaning;
    flashIndex = (flashIndex + 1) % words.length;
  }

  // Quiz
  let score = 0;
  const quiz = {
    question: "What does 'Hola' mean?",
    correct: "A"
  };

  document.getElementById("question").innerText = quiz.question;

  function answer(choice) {
    if (choice === quiz.correct) {
      document.getElementById("result").innerText = "Correct!";
      score++;
    } else {
      document.getElementById("result").innerText = "Wrong!";
    }
    document.getElementById("score").innerText = "Score: " + score;
  }
</script>

</body>
  </html>
